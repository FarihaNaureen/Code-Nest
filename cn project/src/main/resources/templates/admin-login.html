<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | CodeNest Admin Portal</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: rgba(18, 24, 43, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --purple-glow: rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem;
        }

        /* Glassmorphism utility */
        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .header img {
            width: 80px;
            height: auto;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-weight: 300;
        }

        .security-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .security-banner i {
            color: var(--danger);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
            width: 100%;
            max-width: 900px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .stat-card {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
        }

        .stat-icon {
            color: var(--primary);
            font-size: 1.25rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Login Form */
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            position: relative;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i.icon-left {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--purple-glow);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
        }

        .toggle-password:hover {
            color: var(--text-main);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .checkbox-label input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .toast {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideInRight 0.3s ease forwards;
            opacity: 0;
            transform: translateX(100%);
        }

        .toast.error {
            background: rgba(220, 38, 38, 0.9);
            border-left: 4px solid #f87171;
            color: #fff;
        }
        
        .toast.success {
            background: rgba(16, 185, 129, 0.9);
            border-left: 4px solid #34d399;
            color: #fff;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOutRight {
            to { opacity: 0; transform: translateX(100%); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .login-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="/images/dsa_nest_logo.png" alt="CodeNest Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/8297/8297314.png'">
        <h1>CodeNest Admin Portal</h1>
        <p>Secure Administrative Access</p>
    </div>

    <div class="security-banner">
        <i class="fas fa-shield-alt"></i>
        <span><strong>WARNING:</strong> Authorized Personnel Only. Unauthorized access is strictly prohibited and logged.</span>
    </div>

    <!-- System Stats -->
    <div class="stats-grid">
        <div class="stat-card glass">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-value">12,450</div>
            <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card glass">
            <div class="stat-icon"><i class="fas fa-gamepad"></i></div>
            <div class="stat-value">3,102</div>
            <div class="stat-label">Active Players (24h)</div>
        </div>
        <div class="stat-card glass">
            <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
            <div class="stat-value">48</div>
            <div class="stat-label">Total Levels</div>
        </div>
        <div class="stat-card glass">
            <div class="stat-icon" style="color: var(--success);"><i class="fas fa-server"></i></div>
            <div class="stat-value" style="font-size: 1.2rem; line-height: 1.75rem;">Healthy</div>
            <div class="stat-label">Server Status</div>
        </div>
    </div>

    <!-- Login Form -->
    <div class="login-container glass">
        <form action="/admin/login" method="POST" id="adminLoginForm">
            <input type="hidden" th:name="${_csrf != null ? _csrf.parameterName : 'dummy'}" th:value="${_csrf != null ? _csrf.token : ''}" />
            
            <div class="form-group">
                <label class="form-label">Admin Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-shield icon-left"></i>
                    <input type="text" name="username" class="form-control" placeholder="Enter admin username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock icon-left"></i>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember-me">
                    <span>Remember me on this device</span>
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Secure Login</span>
                <i class="fas fa-arrow-right btn-icon"></i>
                <div class="spinner"></div>
            </button>
        </form>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer">
        <div th:if="${error}" class="toast error" id="serverErrorToast">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}"></span>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const text = btn.querySelector('.btn-text');
            const icon = btn.querySelector('.btn-icon');
            const spinner = btn.querySelector('.spinner');

            // Show loading state
            btn.style.opacity = '0.9';
            btn.style.cursor = 'not-allowed';
            text.textContent = 'Authenticating...';
            icon.style.display = 'none';
            spinner.style.display = 'block';
            
            // Allow form to submit
        });

        // Handle server error toast auto-dismiss
        document.addEventListener("DOMContentLoaded", function() {
            const serverToast = document.getElementById('serverErrorToast');
            if (serverToast) {
                setTimeout(() => {
                    serverToast.style.animation = 'fadeOutRight 0.3s ease forwards';
                    setTimeout(() => serverToast.remove(), 300);
                }, 5000);
            }
        });

        // Helper function to show client-side toasts
        function showToast(message, type = 'error') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const iconClass = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
            toast.innerHTML = `
                <i class="fas ${iconClass}"></i>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOutRight 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }
    </script>
</body>
</html>
