<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Nest: Verify OTP</title>
    <th:block th:replace="~{fragments :: imports}"></th:block>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Navigation Bar -->
    <div th:replace="~{fragments :: hudNav}"></div>

    <!-- Main Auth Content Area -->
    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; position: relative; z-index: 10;">
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 420px; position: relative;">
            
            <!-- CRT monitor speech box -->
            <div style="position: relative; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                <img src="/images/pixel_crt_computer.png" style="width: 70px; height: 70px; animation: float 3s infinite ease-in-out;" />
                <div style="background: white; border: 2px solid #000; border-radius: 8px; padding: 10px 15px; color: #000; font-family: 'Outfit', sans-serif; font-size: 0.8rem; font-weight: bold; line-height: 1.3; max-width: 250px; position: relative; box-shadow: 3px 3px 0 rgba(0,0,0,0.15);">
                    <span>We sent a magic code to your email!</span>
                    <div style="position: absolute; left: -8px; top: 50%; transform: translateY(-50%) rotate(45deg); width: 12px; height: 12px; background: white; border-left: 2px solid #000; border-bottom: 2px solid #000;"></div>
                </div>
            </div>

            <!-- White Auth Card -->
            <div class="codedex-auth-card">
                <h2 style="font-family: var(--font-heading); color: var(--text-primary); text-align: center; font-size: 1.25rem; margin-bottom: 10px; letter-spacing: 1px;">Enter OTP</h2>
                
                <p style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px;">
                    Sent to <strong th:text="${email}">your email</strong>
                </p>
                
                <div th:if="${error}" style="background: rgba(239, 68, 68, 0.1); border: 1px solid red; color: #991b1b; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 0.8rem; font-weight: 600; text-align: center;" th:text="${error}">
                    Registration error details.
                </div>

                <form th:action="@{/auth/register/verify}" method="POST">
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label for="otp">Verification Code</label>
                        <input type="text" id="otp" name="otp" placeholder="Enter 6-digit code..." required="required" maxlength="6" style="width: 100%; text-align: center; letter-spacing: 4px; font-size: 1.2rem; font-weight: bold;" />
                    </div>

                    <button type="submit" class="btn-secondary" style="width: 100%; font-size: 0.95rem; padding: 12px 20px;">Verify & Complete Registration</button>
                </form>

                <div style="font-size: 0.85rem; margin-top: 25px; text-align: center; color: #64748b;">
                    Didn't receive the code? <a href="/auth/register" style="color: #38bdf8; font-weight: bold; text-decoration: none;">Try again</a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <div th:replace="~{fragments :: footer}"></div>

</body>
</html>
